name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Find project root (folder with settings.gradle)
        id: find_root
        run: |
          ROOT=$(find . -maxdepth 3 -name "settings.gradle*" -not -path "*/node_modules/*" | head -1 | xargs dirname)
          if [ -z "$ROOT" ]; then
            echo "Could not find settings.gradle anywhere. Repo structure:"
            find . -maxdepth 3 -type f
            exit 1
          fi
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "Project root detected: $ROOT"

      - name: Remove stray Termux-specific local.properties overrides
        working-directory: ${{ steps.find_root.outputs.root }}
        run: |
          if [ -f "local.properties" ]; then
            echo "Found local.properties, contents:"
            cat local.properties
            echo "Removing any aapt2/Termux-specific paths..."
            sed -i '/com\.termux/d' local.properties
            sed -i '/aapt2/Id' local.properties
          fi
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "Final local.properties:"
          cat local.properties

      - name: Ensure Gradle wrapper exists
        working-directory: ${{ steps.find_root.outputs.root }}
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew not found, generating wrapper..."
            sudo apt-get update -y && sudo apt-get install -y gradle
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        working-directory: ${{ steps.find_root.outputs.root }}
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdroid-debug-apk
          path: '**/app/build/outputs/apk/debug/*.apk'