name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Find project root (folder with settings.gradle)
        id: find_root
        run: |
          ROOT=$(find . -maxdepth 3 -name "settings.gradle*" -not -path "*/node_modules/*" | head -1 | xargs dirname)
          if [ -z "$ROOT" ]; then
            echo "Could not find settings.gradle anywhere. Repo structure:"
            find . -maxdepth 3 -type f
            exit 1
          fi
          echo "root=$ROOT" >> "$GITHUB_OUTPUT"
          echo "Project root detected: $ROOT"

      - name: Diagnose and remove Termux-specific overrides anywhere in repo
        working-directory: ${{ steps.find_root.outputs.root }}
        run: |
          echo "== Searching entire repo for the Termux aapt2 override =="
          grep -rn "com.termux" . --include="*.properties" --include="*.gradle" --include="*.gradle.kts" || echo "No matches in property/gradle files"
          grep -rln "com.termux" . 2>/dev/null | grep -v "^\./\.git" || echo "No matches anywhere"
          echo "== Removing com.termux references from all properties/gradle files =="
          find . -type f \( -name "*.properties" -o -name "*.gradle" -o -name "*.gradle.kts" \) -not -path "*/.git/*" | while read -r f; do
            if grep -q "com.termux" "$f" 2>/dev/null; then
              echo "Cleaning: $f"
              sed -i '/com\.termux/d' "$f"
            fi
          done
          echo "== Ensuring root gradle.properties does not force aapt2 path =="
          for GP in gradle.properties app/gradle.properties; do
            if [ -f "$GP" ]; then
              echo "--- $GP ---"
              cat "$GP"
            fi
          done

      - name: Force correct local.properties
        working-directory: ${{ steps.find_root.outputs.root }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "Final local.properties:"
          cat local.properties

      - name: Ensure Gradle wrapper exists
        working-directory: ${{ steps.find_root.outputs.root }}
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew not found, generating wrapper..."
            sudo apt-get update -y && sudo apt-get install -y gradle
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        working-directory: ${{ steps.find_root.outputs.root }}
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdroid-debug-apk
          path: '**/app/build/outputs/apk/debug/*.apk'